name: Publish to npm

# Trusted Publishing (OIDC) を使用。長期トークン不要。
# npmjs.com で Trusted Publisher を事前登録すること:
#   - Owner: devgonzui-ai
#   - Repository: claude-task-manager
#   - Workflow filename: npm-publish.yml
#
# 注意: NPM_TOKEN シークレットが残っていると setup-node が
# NODE_AUTH_TOKEN に注入し OIDC を妨害する。必ず削除すること。
on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - run: npm ci

      - run: npm run test:ci

      - name: Verify version match
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Update npm for OIDC publishing
        run: |
          npm install -g npm@latest
          echo "npm version: $(npm -v)"

      - run: npm publish

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
