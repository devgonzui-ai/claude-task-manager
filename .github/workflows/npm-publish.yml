name: Publish to npm

# Trusted Publishing (OIDC) を使用。長期トークン不要。
# npmjs.com で Trusted Publisher を事前登録すること:
#   - Owner: devgonzui-ai
#   - Repository: claude-task-manager
#   - Workflow filename: npm-publish.yml
#   - Allowed actions: npm publish
on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - run: npm ci

      - run: npm run test:ci

      - name: Verify version match
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Update npm for OIDC
        run: npm install -g npm@">=11.5.1"

      - name: Debug auth state
        run: |
          echo "npm version: $(npm -v)"
          echo "=== .npmrc ==="
          cat "$NPM_CONFIG_USERCONFIG" 2>/dev/null || echo "no .npmrc"
          echo "=== npm config ==="
          npm config list
          echo "=== NODE_AUTH_TOKEN set? ==="
          [ -n "$NODE_AUTH_TOKEN" ] && echo "yes (length: ${#NODE_AUTH_TOKEN})" || echo "no"

      - name: Publish to npm
        run: npm publish --verbose
        env:
          NODE_AUTH_TOKEN: ''

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
